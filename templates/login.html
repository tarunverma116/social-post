<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #111, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .card {
            width: 380px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            color: #ffd700;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            font-size: 13px;
            color: #aaa;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.05);
            color: #fff;
            transition: 0.3s;
        }

        .input-group input:focus {
            box-shadow: 0 0 10px #ffd700;
            background: rgba(255,255,255,0.08);
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            color: #000;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px #ffd700;
        }

        .footer {
            margin-top: 15px;
            font-size: 13px;
            color: #aaa;
        }

        .footer a {
            color: #ffd700;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .message {
            color: #00ff88;
            margin-bottom: 10px;
        }

        /* subtle gold glow */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: #ffd700;
            filter: blur(150px);
            opacity: 0.08;
            z-index: -1;
        }
    </style>
</head>

<body>

<div class="glow"></div>

<div class="card">

    <h2>Welcome Back</h2>

    <div class="message">
        {{ message | default('') }}
    </div>

    <form method="post" action="/login">

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button class="btn">Login</button>
    </form>

    <div class="footer">
        Don’t have an account? <a href="/register">Register</a>
    </div>

</div>

</body>
</html>
