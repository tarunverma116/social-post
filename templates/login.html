<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at center, #0a0f2c, #020617);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 380px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 123, 255, 0.2);
            text-align: center;
        }

        .card h2 {
            color: #fff;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            color: #aaa;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.08);
            color: #fff;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px #3b82f6;
            background: rgba(255,255,255,0.12);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            margin-top: 10px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #3b82f6;
        }

        .link {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
        }

        .link a {
            color: #3b82f6;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .message {
            color: #22c55e;
            margin-bottom: 10px;
        }

        .error {
            color: #ef4444;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Welcome Back</h2>

    <!-- Success message -->
    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    <!-- Error message -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button class="btn">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="/register">Register</a>
    </div>

</div>

</body>
</html>
