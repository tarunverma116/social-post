<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: radial-gradient(circle at top, #0a0f2c, #020617);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

.navbar h2 {
    color: #3b82f6;
}

.navbar a {
    color: #aaa;
    margin-left: 20px;
    text-decoration: none;
}

.navbar a:hover {
    color: #fff;
}

/* CONTAINER */
.container {
    width: 500px;
    margin: 40px auto;
}

/* CREATE POST BOX */
.post-box {
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    margin-bottom: 30px;
    box-shadow: 0 0 30px rgba(59,130,246,0.2);
}

textarea {
    width: 100%;
    height: 90px;
    border-radius: 12px;
    border: none;
    padding: 12px;
    background: rgba(255,255,255,0.08);
    color: white;
    resize: none;
}

textarea:focus {
    outline: none;
    box-shadow: 0 0 10px #3b82f6;
}

/* BUTTON */
.btn {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #3b82f6;
}

/* POSTS */
.post {
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    margin-bottom: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 20px rgba(59,130,246,0.1);
}

/* META INFO */
.meta {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 10px;
}

.username {
    color: #3b82f6;
    font-weight: bold;
}

.content {
    font-size: 15px;
    line-height: 1.5;
}

/* EMPTY STATE */
.empty {
    text-align: center;
    color: #777;
    margin-top: 50px;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>SocialPost</h2>
    <div>
        <a href="/fetch_all">Users</a>

        <form action="/logout" method="post" style="display:inline;">
            <button class="btn">Logout</button>
        </form>
    </div>
</div>

<div class="container">

    <!-- CREATE POST -->
    <div class="post-box">
        <form method="POST" action="/create_post">
            <textarea name="content" placeholder="What's on your mind, {{ current_user.username }}?"></textarea>
            <button class="btn">Create Post</button>
        </form>
    </div>

    <!-- POSTS -->
    {% if posts %}
        {% for post in posts %}
            <div class="post">

                <div class="meta">
                    👤 <span class="username">{{ post.user.username }}</span> |
                    🆔 {{ post.user.id }} |
                    🕒 {{ post.created_at }}
                </div>

                <div class="content">
                    {{ post.content }}
                </div>

            </div>
        {% endfor %}
    {% else %}
        <div class="empty">
            No posts yet 🚀 <br> Be the first to post!
        </div>
    {% endif %}

</div>

</body>
</html>
