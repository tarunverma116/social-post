<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0a0f2c, #020617);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
}

.navbar h2 {
    color: #3b82f6;
}

.navbar a {
    color: #aaa;
    margin-left: 20px;
    text-decoration: none;
}

.navbar a:hover {
    color: #fff;
}

/* CARD */
.container {
    display: flex;
    justify-content: center;
    margin-top: 80px;
}

.card {
    width: 420px;
    padding: 40px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(25px);
    text-align: center;
    box-shadow: 0 0 60px rgba(59,130,246,0.2);
}

.avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg,#3b82f6,#6366f1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin: auto;
}

h1 {
    margin: 20px 0;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-top: 12px;
    cursor: pointer;
    font-weight: bold;
}

.blue { background: #3b82f6; color: white; }
.red { background: #ef4444; color: white; }
.gray { background: #374151; color: white; }
.green {
    background: linear-gradient(135deg,#10b981,#059669);
    margin-top: 20px;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="navbar">
    <h2>SocialPost</h2>
    <div>
        <a href="/dashboard{{user_id}}">Dashboard</a>
        <a href="/fetch_all">Users</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    <div class="card">

        <div class="avatar">
            {{ current_user[0] }}
        </div>

        <h1>Welcome, {{ current_user }}</h1>

        <button class="btn blue" onclick="location.href='/update_email/{{user_id}}'">
            Update Email
        </button>

        <button class="btn red" onclick="location.href='/delete_account/{{user_id}}'">
            Delete Account
        </button>

        <form action="/logout" method="post">
            <button class="btn gray">Logout</button>
        </form>

        <button class="btn green" onclick="location.href='/fetch_all'">
            View All Users
        </button>

    </div>
</div>

</body>
</html>
