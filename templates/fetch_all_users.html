<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Users</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle, #0a0f2c, #020617);
    color: white;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.header h1 {
    color: #3b82f6;
}

.header button {
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    background: #374151;
    color: white;
    cursor: pointer;
}

/* USERS GRID */
.container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 40px;
}

.card {
    width: 260px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(59,130,246,0.2);
}

.card h3 {
    margin-bottom: 5px;
}

.card p {
    color: #aaa;
}

/* BUTTONS */
.btn {
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
    cursor: pointer;
}

.update { background: #3b82f6; color: white; }
.delete { background: #ef4444; color: white; }

.btn:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="header">
    <h1>All Users</h1>
    <button onclick="history.back()">Back</button>
</div>

<div class="container">

{% for user in users %}
<div class="card">
    <h3>{{ user.username }}</h3>
    <p>{{ user.email }}</p>

    <button class="btn update" onclick="location.href='/update_email/{{user.id}}'">
        Update
    </button>

    <button class="btn delete" onclick="location.href='/delete_account/{{user.id}}'">
        Delete
    </button>
</div>
{% endfor %}

</div>

</body>
</html>
