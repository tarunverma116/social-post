<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle, #0a0f2c, #020617);
    color: white;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.header h1 {
    color: #3b82f6;
}

/* CARD */
.container {
    display: flex;
    justify-content: center;
    margin-top: 60px;
}

.card {
    width: 350px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    text-align: center;
    box-shadow: 0 0 30px rgba(59,130,246,0.2);
}

.avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg,#3b82f6,#6366f1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin: auto;
}

.username {
    margin-top: 15px;
    font-size: 20px;
    font-weight: bold;
}

.email {
    color: #aaa;
    margin-top: 5px;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="header">
    <h1>My Profile</h1>
    <button class="btn" onclick="history.back()">Back</button>
</div>

<div class="container">
    <div class="card">

        <div class="avatar">
            {{ user.username[0] }}
        </div>

        <div class="username">
            {{ user.username }}
        </div>

        <div class="email">
            {{ user.email }}
        </div>

    </div>
</div>

</body>
</html>
