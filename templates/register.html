<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            color: white;
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 10px;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: #4facfe;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00c6ff;
        }

        .footer {
            margin-top: 15px;
            font-size: 14px;
        }

        .footer a {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Create Account</h2>

    <form method="POST">
        {{ form.hidden_tag() }}

        <div class="input-group">
            <label>Username</label>
            {{ form.username() }}
        </div>

        <div class="input-group">
            <label>Email</label>
            {{ form.email() }}
        </div>

        <div class="input-group">
            <label>Password</label>
            {{ form.password() }}
        </div>

        <div class="input-group">
            <label>Repeat Password</label>
            {{ form.confirm_password() }}
        </div>

        <button type="submit" class="btn">Register</button>
    </form>

    <div class="footer">
        Already have an account? <a href="/login">Login</a>
    </div>
</div>

</body>
</html>
